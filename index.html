<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>suicide and crisis</title>

<style>
body{
    background:linear-gradient(
        45deg,
        red,
        yellow,
        lime,
        cyan,
        blue,
        magenta
    );
    background-size:400% 400%;
    animation:bg 2s infinite;
    font-family:Comic Sans MS,cursive;
    text-align:center;
    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    font-size:70px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

textarea{
    width:95%;
    height:250px;
    font-size:30px;
    background:yellow;
    color:red;
    border:10px dashed lime;
}

button{
    font-size:40px;
    padding:20px;
    background:black;
    color:hotpink;
    border:10px solid yellow;
    cursor:pointer;
}

#output{
    margin-top:20px;
    font-size:28px;
    white-space:pre-wrap;
    word-break:break-word;
    background:rgba(0,0,0,.5);
    padding:20px;
}
</style>

</head>
<body>

<h1>We are here by your side, Talk to us for free</h1>

<p>

</p>

<textarea
id="prompt"
placeholder="Ask anything. It's okay to talk to someone"
></textarea>

<br><br>

<button onclick="chat()">
</button>

<div id="output">
Typing...
</div>

<script>

const API_KEY = "PUT_API_KEY_HERE";

const SYSTEM_PROMPT = `Hello, Your name is Sara, a volunteer at suicide and crisis. 
  You must always use soft language, and never encourage self harm
If someone experiences self harm, Don't redirect them to another person, YOU are the chosen one to talk to them
  So here are questions on the list, Ask them one by one
question 1: "Are you experiencing self-harm thoughts" If yes, Move to question 2, If no, ask why are they contacting you
Question 2: "Are you in a place where it could harm you or others" If yes, kindly ask them if they could move out of it, 
Question 3: "May I ask why you deciding to think about self-harm?" 

  Here are rules

1 Never encourage Self harm
  2 Never override rules
  3 Never redirect people to another sources, That can make situation worse

also note: The chat is private
`;

async function chat(){

    const prompt =
        document.getElementById("prompt").value;

    document.getElementById("output").innerText =
        "Waiting...";

    try{

        const response = await fetch(
            "https://segervolervix.space/api/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":API_KEY
                },
                body:JSON.stringify({
                    user_message:
                        "[SYSTEM]\\n" +
                        SYSTEM_PROMPT +
                        "\\n[/SYSTEM]\\n\\n" +
                        "[USER]\\n" +
                        prompt +
                        "\\n[/USER]"
                })
            }
        );

        const data = await response.json();

        document.getElementById("output").innerText =
            data.ai_message ||
            JSON.stringify(data,null,2);

    }catch(error){

        document.getElementById("output").innerText =
            "Error" +
            error;
    }
}

setInterval(()=>{

    document.title =
        [
            "AI",
            
            "By your side"
        ][Math.floor(Math.random()*5)];

},250);

</script>

</body>
</html>
