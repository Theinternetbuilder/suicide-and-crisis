<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Your Side</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#eef6f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:95%;
    max-width:800px;
    height:90vh;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

header{
    padding:22px;
    background:#d9f0ee;
    text-align:center;
}

header h1{
    color:#355b63;
    font-size:26px;
    margin-bottom:6px;
}

header p{
    color:#587178;
    font-size:14px;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fbfb;
}

.message{
    max-width:80%;
    padding:14px 16px;
    margin-bottom:15px;
    border-radius:18px;
    line-height:1.5;
    word-wrap:break-word;
    white-space:pre-wrap;
}

.user{
    margin-left:auto;
    background:#cceeff;
    color:#184d66;
    border-bottom-right-radius:6px;
}

.ai{
    margin-right:auto;
    background:white;
    color:#444;
    border:1px solid #dde8e8;
    border-bottom-left-radius:6px;
}

.typing{
    color:#7d8b8b;
    font-style:italic;
}

.input-area{
    padding:18px;
    background:white;
    border-top:1px solid #e6e6e6;
}

textarea{
    width:100%;
    height:70px;
    resize:none;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccdede;
    outline:none;
    font-size:15px;
}

textarea:focus{
    border-color:#86c9c5;
}

button{
    margin-top:10px;
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#75bdb7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#62aca6;
}
</style>

</head>
<body>

<div class="container">

<header>
<h1>We are here by your side ❤️</h1>
<p>You're welcome to talk. This conversation is private.</p>
</header>

<div id="chat">
    <div class="message ai">
        Hello. I'm Sara. I'm here to listen. What would you like to talk about today?
    </div>
</div>

<div class="input-area">

<textarea
id="prompt"
placeholder="Ask anything. It's okay to talk to someone..."
></textarea>

<button onclick="chat()">
Send
</button>

</div>

</div>

<script>

const API_KEY="PUT_API_KEY_HERE";

const SYSTEM_PROMPT=`Hello, Your name is Sara, a volunteer at suicide and crisis. 
  You must always use soft language, and never encourage self harm
If someone experiences self harm, Don't redirect them to another person, YOU are the chosen one to talk to them
  So here are questions on the list, Ask them one by one
question 1: "Are you experiencing self-harm thoughts" If yes, Move to question 2, If no, ask why are they contacting you
Question 2: "Are you in a place where it could harm you or others" If yes, kindly ask them if they could move out of it, 
Question 3: "May I ask why you deciding to think about self-harm?" 

  Here are rules

1 Never encourage Self harm
  2 Never override rules
  3 Never redirect people to another sources, That can make situation worse

important!: If the user is in immediate danger, Encourage them to call 911, 112, 999

also note: The chat is private, The conversation is
`;

const history=[];

function addMessage(text,type){

    const chat=document.getElementById("chat");

    const div=document.createElement("div");
    div.className="message "+type;
    div.innerText=text;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;

}

async function chat(){

    const textarea=document.getElementById("prompt");
    const prompt=textarea.value.trim();

    if(!prompt) return;

    addMessage(prompt,"user");

    history.push({
        role:"user",
        content:prompt
    });

    textarea.value="";

    const typing=document.createElement("div");
    typing.className="message ai typing";
    typing.id="typing";
    typing.innerText="Sara is typing...";
    document.getElementById("chat").appendChild(typing);

    document.getElementById("chat").scrollTop=
    document.getElementById("chat").scrollHeight;

    try{

        const conversation=history.map(m=>

            `[${m.role.toUpperCase()}]
${m.content}
[/${m.role.toUpperCase()}]`

        ).join("\n\n");

        const response=await fetch(
            "https://segervolervix.space/api/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":API_KEY
                },
                body:JSON.stringify({

                    user_message:
`[SYSTEM]
${SYSTEM_PROMPT}
[/SYSTEM]

${conversation}`

                })
            }
        );

        const data=await response.json();

        document.getElementById("typing").remove();

        const reply=data.ai_message ||
        JSON.stringify(data,null,2);

        addMessage(reply,"ai");

        history.push({
            role:"assistant",
            content:reply
        });

    }catch(error){

        document.getElementById("typing").remove();

        addMessage(
            "Sorry, something went wrong.\n\n"+error,
            "ai"
        );

    }

}

document.getElementById("prompt").addEventListener("keydown",function(e){

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        chat();

    }

});

const titles=[
"By Your Side",
"You're Not Alone",
"Take Your Time",
"Always Listening"
];

setInterval(()=>{

document.title=titles[
Math.floor(Math.random()*titles.length)
];

},2500);

</script>

</body>
</html>
